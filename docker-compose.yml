version: '3.8'

# Two named networks keep the attack surface minimal:
#   bench-infra (internal=true): redis, api, worker, observability — no internet routing
#   bench-front:                 api, observability, frontend — browser-accessible services
#
# Submission engine containers get their own ephemeral --internal network per run
# (created/destroyed dynamically by worker/src/docker.ts).

networks:
  bench-infra:
    driver: bridge
    internal: true
  bench-front:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    networks:
      - bench-infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3000
      OBS_HOST: observability
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front
    volumes:
      - submissions:/submissions

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Optional: set DOCKER_RUNTIME=runsc after installing gVisor on host.
      # Install guide: https://gvisor.dev/docs/user_guide/install/
      # DOCKER_RUNTIME: runsc
      #
      # Optional: path on the Docker HOST (not inside worker) to the seccomp allowlist.
      # Setup: cp infra/seccomp/bench-engine.json /etc/docker/seccomp/bench-engine.json
      # SECCOMP_PROFILE: /etc/docker/seccomp/bench-engine.json
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - submissions:/submissions
    # On Linux, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  observability:
    build:
      context: .
      dockerfile: services/observability/Dockerfile
    ports:
      - "3002:3002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OBS_PORT: 3002
      # Set these to enable HTTP Basic Auth on all observability routes.
      # OBS_USER: admin
      # OBS_PASS: changeme
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front

  frontend:
    build:
      context: services/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:3000
        OBS_URL: http://observability:3002
    ports:
      - "3001:3001"
    depends_on:
      - api
      - observability
    networks:
      - bench-front

volumes:
  submissions:
