# Three named networks keep the attack surface minimal:
#   bench-infra (internal=true): redis, api, worker, observability — no internet routing
#   bench-front:                 proxy, api, observability, frontend — browser-accessible services
#   bench-docker (internal):     dedicated Docker daemon access for worker only
#
# Worker does not mount the host Docker socket directly. Instead it uses an internal
# Docker daemon service for sandbox build/run operations.
#
# Submission engine containers get their own ephemeral --internal network per run
# (created/destroyed dynamically by worker/src/docker.ts).
#
# Admin access: http://localhost/admin  (user: admin, pass: benchmark2026)
# Change password: docker run --rm caddy:2-alpine caddy hash-password --plaintext '<newpass>'
# then update OBS_PASS_HASH below and run: docker compose up -d proxy

networks:
  bench-infra:
    driver: bridge
    internal: true
  bench-front:
    driver: bridge
  bench-docker:
    driver: bridge

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_HOST: ${CADDY_HOST:-:80}
      OBS_USER: admin
      OBS_PASS_HASH: $$2a$$14$$J9faJ6XqDXT0GeKtSm8J4OQY9j4Bdl/6jaYzeZFo8eW2V3JsML4Qq
    networks:
      - bench-front
    depends_on:
      - frontend
      - api
      - observability

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bench-infra
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  docker-daemon:
    image: docker:24-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]
    networks:
      - bench-docker
    volumes:
      - docker-data:/var/lib/docker
      - ./infra/seccomp:/etc/docker/seccomp:ro

  api:
    image: ghcr.io/swapnaneelr/benchmark-api:latest
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3000
      OBS_HOST: observability
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front
    volumes:
      - submissions:/submissions

  worker:
    image: ghcr.io/swapnaneelr/benchmark-worker:latest
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOCKER_HOST: tcp://docker-daemon:2375
      SECCOMP_PROFILE: /etc/docker/seccomp/bench-engine.json
      # Optional: set DOCKER_RUNTIME=runsc after installing gVisor on host.
      # Install guide: https://gvisor.dev/docs/user_guide/install/
      # DOCKER_RUNTIME: runsc
    depends_on:
      redis:
        condition: service_healthy
      docker-daemon:
        condition: service_started
    networks:
      - bench-infra
      - bench-docker
    volumes:
      - submissions:/submissions
      - ./infra/seccomp:/etc/docker/seccomp:ro
    # On Linux, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  observability:
    image: ghcr.io/swapnaneelr/benchmark-observability:latest
    build:
      context: .
      dockerfile: services/observability/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front

  frontend:
    image: ghcr.io/swapnaneelr/benchmark-frontend:latest
    build:
      context: services/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:3000
        OBS_URL: http://observability:3002
    restart: unless-stopped
    depends_on:
      - api
      - observability
    networks:
      - bench-front

volumes:
  submissions:
  redis-data:
  docker-data:
  caddy-data:
  caddy-config:
