version: '3.8'

# Two named networks keep the attack surface minimal:
#   bench-infra (internal=true): redis, api, worker, observability — no internet routing
#   bench-front:                 proxy, api, observability, frontend — browser-accessible services
#
# Submission engine containers get their own ephemeral --internal network per run
# (created/destroyed dynamically by worker/src/docker.ts).
#
# Admin access: http://localhost/admin  (user: admin, pass: benchmark2026)
# Change password: docker run --rm caddy:2-alpine caddy hash-password --plaintext '<newpass>'
# then update OBS_PASS_HASH below and run: docker compose up -d proxy

networks:
  bench-infra:
    driver: bridge
    internal: true
  bench-front:
    driver: bridge

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      OBS_USER: admin
      OBS_PASS_HASH: $$2a$$14$$J9faJ6XqDXT0GeKtSm8J4OQY9j4Bdl/6jaYzeZFo8eW2V3JsML4Qq
    networks:
      - bench-front
    depends_on:
      - frontend
      - api
      - observability

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bench-infra
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3000
      OBS_HOST: observability
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front
    volumes:
      - submissions:/submissions

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Optional: set DOCKER_RUNTIME=runsc after installing gVisor on host.
      # Install guide: https://gvisor.dev/docs/user_guide/install/
      # DOCKER_RUNTIME: runsc
      #
      # Optional: path on the Docker HOST (not inside worker) to the seccomp allowlist.
      # Setup: cp infra/seccomp/bench-engine.json /etc/docker/seccomp/bench-engine.json
      # SECCOMP_PROFILE: /etc/docker/seccomp/bench-engine.json
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - submissions:/submissions
    # On Linux, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  observability:
    build:
      context: .
      dockerfile: services/observability/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bench-infra
      - bench-front

  frontend:
    build:
      context: services/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:3000
        OBS_URL: http://observability:3002
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - api
      - observability
    networks:
      - bench-front

volumes:
  submissions:
  redis-data:
  caddy-data:
  caddy-config:
