version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - submissions:/submissions

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENGINE_HOST: host.docker.internal
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - submissions:/submissions
    # On Linux, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  observability:
    build:
      context: .
      dockerfile: services/observability/Dockerfile
    ports:
      - "3002:3002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OBS_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: services/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:3000
        OBS_URL: http://observability:3002
    ports:
      - "3001:3001"
    depends_on:
      - api
      - observability

volumes:
  submissions:
