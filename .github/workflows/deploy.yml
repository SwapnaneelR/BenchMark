name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd BenchMark
            git remote set-url origin https://github.com/SwapnaneelR/BenchMark.git
            git fetch origin
            git reset --hard origin/main
            # Clean extracted dirs from submissions volume
            docker run --rm -v benchmark_submissions:/submissions alpine sh -c "rm -rf /submissions/*/*/extracted" || true
            # Remove swollen DinD volume (recreated automatically on next run)
            docker volume rm benchmark_docker-data || true
            # Prune unused images and build cache to prevent ENOSPC
            docker system prune -af
            docker builder prune -af
            # Force full rebuild with no layer cache, then start
            docker compose build --no-cache
            docker compose up -d
            docker compose ps

