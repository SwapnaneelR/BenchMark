name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # enables manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            REPO_DIR=$(find /root /home -maxdepth 3 -name "docker-compose.yml" 2>/dev/null | head -1 | xargs dirname)
            echo "Found repo at: $REPO_DIR"
            # Prune first to reclaim disk before pulling/building
            docker run --rm -v benchmark_submissions:/submissions alpine sh -c "rm -rf /submissions/*/*/extracted" || true
            docker volume rm benchmark_docker-data || true
            docker system prune -af --volumes
            docker builder prune -af
            cd "$REPO_DIR"
            git remote set-url origin https://github.com/SwapnaneelR/BenchMark.git
            git fetch origin
            git reset --hard origin/main
            # Build services one at a time + prune intermediate layers between each
            # Prevents 4 services stacking temp layers simultaneously on an 8GB disk
            docker compose build api
            docker builder prune -f
            docker compose build observability
            docker builder prune -f
            docker compose build frontend
            docker builder prune -f
            docker compose build worker
            docker builder prune -f
            docker compose up -d
            docker compose ps

