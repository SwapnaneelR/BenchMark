name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd BenchMark
            git pull
            # Forcefully clean the submissions volume using a temporary container (bypasses need for worker to be running)
            docker run --rm -v benchmark_submissions:/submissions alpine sh -c "rm -rf /submissions/*/*/extracted" || true
            # Delete the swollen docker-in-docker volume entirely (it will be recreated automatically)
            docker volume rm benchmark_docker-data || true
            # Clean up host docker system and builder cache
            docker system prune -af
            docker builder prune -af
            docker compose up --build -d
            docker compose ps

