name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd BenchMark
            git pull
            # Clean up the DinD daemon's unused containers/images/volumes to free up space
            docker compose exec -T docker-daemon docker system prune -af --volumes || true
            # Clean up host docker system and builder cache
            docker system prune -f
            docker builder prune -af
            docker compose up --build -d
            docker compose ps

