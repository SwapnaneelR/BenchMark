name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/benchmark-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push observability
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/observability/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/benchmark-observability:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          file: services/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/benchmark-frontend:latest
          build-args: |
            API_URL=http://api:3000
            OBS_URL=http://observability:3002
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/benchmark-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 10m
          script: |
            set -e
            REPO_DIR=$(find /root /home -maxdepth 3 -name "docker-compose.yml" 2>/dev/null | head -1 | xargs dirname)
            cd "$REPO_DIR"
            git remote set-url origin https://github.com/SwapnaneelR/BenchMark.git
            git fetch origin && git reset --hard origin/main
            # Clean old submission artifacts and DinD volume
            docker run --rm -v benchmark_submissions:/submissions alpine sh -c "rm -rf /submissions/*/*/extracted" || true
            docker volume rm benchmark_docker-data || true
            # Pull pre-built images from ghcr.io (no build on server)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull api observability frontend worker
            docker compose up -d
            docker compose ps
